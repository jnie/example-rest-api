name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify Maven wrapper
        run: |
          ls -la .mvn/wrapper/
          ls -la mvnw

      - name: Build with Maven
        run: |
          chmod +x ./mvnw
          ./mvnw clean install -DskipTests

      - name: Run tests
        run: |
          chmod +x ./mvnw
          ./mvnw test
